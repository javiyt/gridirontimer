name: Tests, Coverage & Code Analysis

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/test-coverage-lint.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/test-coverage-lint.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --parallel --max-workers=4 --build-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 5

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: app/build/test-results/testDebugUnitTest/TEST-*.xml
          check_name: Test Results

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate and verify coverage
        run: ./gradlew koverXmlReport koverVerify --parallel --build-cache

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/build/reports/kover/
          retention-days: 5

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'app/build/reports/kover/xml/report.xml';
            
            if (fs.existsSync(reportPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ **Code Coverage Check Passed**\n\nCoverage is >= 80%. See artifacts for detailed report.'
              });
            }

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --parallel --build-cache

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results*.xml
            app/build/reports/lint-results*.html
          retention-days: 5

  summary:
    name: Test, Coverage & Lint Check
    runs-on: ubuntu-latest
    needs: [test, coverage, lint]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "❌ Coverage check failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint check failed"
            exit 1
          fi
          echo "✅ All checks passed"
