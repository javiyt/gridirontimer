name: Quality (Unit, Coverage, Lint)

on:
  push:
    branches: [ main, develop ]
    paths:
      - "app/src/**"
      - "app/build.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/libs.versions.toml"
      - ".github/workflows/test-coverage-lint.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "app/src/**"
      - "app/build.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/libs.versions.toml"
      - ".github/workflows/test-coverage-lint.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_coverage:
    name: Unit Tests + Coverage (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests and coverage (debug)
        run: |
          ./gradlew \
            testDebugUnitTest \
            koverXmlReportDebug \
            koverVerifyDebug \
            --build-cache \
            --parallel \
            --max-workers=2

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            app/build/test-results/testDebugUnitTest/
            app/build/reports/kover/
          retention-days: 5

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: app/build/test-results/testDebugUnitTest/TEST-*.xml
          check_name: Unit Test Results

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");

            function findFile(dir, target) {
              if (!fs.existsSync(dir)) return null;
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  const found = findFile(full, target);
                  if (found) return found;
                } else if (entry.name === target) {
                  return full;
                }
              }
              return null;
            }

            const reportPath = findFile("app/build/reports/kover", "report.xml");
            let message = "⚠️ Coverage report not found. Check artifacts.";

            if (reportPath) {
              const xml = fs.readFileSync(reportPath, "utf8");
              const counters = [...xml.matchAll(/<counter type="LINE" missed="(\d+)" covered="(\d+)"/g)];
              if (counters.length > 0) {
                const last = counters[counters.length - 1];
                const missed = Number(last[1]);
                const covered = Number(last[2]);
                const total = missed + covered;
                const pct = total > 0 ? ((covered * 100) / total).toFixed(2) : "0.00";
                message = `✅ **Coverage (Debug)**: ${pct}% (${covered}/${total} lines)`;
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  lint:
    name: Android Lint (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run lint
        run: ./gradlew lintDebug --build-cache --parallel --max-workers=2

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results*.xml
            app/build/reports/lint-results*.html
          retention-days: 5

  quality:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [unit_coverage, lint]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.unit_coverage.result }}" != "success" ]; then
            echo "❌ Unit tests or coverage failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint failed"
            exit 1
          fi
          echo "✅ All quality checks passed"
