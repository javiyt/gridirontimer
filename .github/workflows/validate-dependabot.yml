name: Validate Dependabot Configuration

on:
  push:
    paths:
      - '.github/dependabot.yml'
  pull_request:
    paths:
      - '.github/dependabot.yml'

permissions:
  contents: read

jobs:
  validate-dependabot:
    name: Validate Dependabot YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dependabot configuration
        uses: platisd/validate-dependabot-action@v1

      - name: Validate YAML schema
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            
            try {
              const config = fs.readFileSync('.github/dependabot.yml', 'utf8');
              const parsed = yaml.load(config);
              
              if (!parsed || !parsed.version || !parsed.updates) {
                throw new Error('Invalid Dependabot configuration: version and updates are required');
              }
              
              if (!Array.isArray(parsed.updates)) {
                throw new Error('Invalid Dependabot configuration: updates must be an array');
              }
              
              parsed.updates.forEach((update, index) => {
                if (!update['package-ecosystem']) {
                  throw new Error(`Invalid Dependabot configuration: update ${index} missing package-ecosystem`);
                }
                if (!update.directory) {
                  throw new Error(`Invalid Dependabot configuration: update ${index} missing directory`);
                }
                if (!update.schedule || !update.schedule.interval) {
                  throw new Error(`Invalid Dependabot configuration: update ${index} missing schedule.interval`);
                }
              });
              
              console.log('✅ Dependabot configuration is valid');
              console.log(`✅ Found ${parsed.updates.length} update configurations`);
              
              parsed.updates.forEach((update, index) => {
                console.log(`  - ${update['package-ecosystem']} (${update.directory})`);
              });
              
            } catch (error) {
              console.error(`❌ Validation failed: ${error.message}`);
              process.exit(1);
            }
