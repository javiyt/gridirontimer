name: Advanced Static Code Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarqube-analysis:
    name: SonarQube Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube analysis

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and generate coverage reports
        run: ./gradlew testDebugUnitTest koverXmlReport

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.projectKey=javiyt_gridirontimer
            -Dsonar.organization=javiyt
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.kotlin.file.suffixes=.kt
            -Dsonar.coverage.exclusions=**/*Composable*,**/presentation/views/**,**/presentation/theme/**
            -Dsonar.coverageReportPaths=app/build/reports/kover/xml/report.xml

      - name: Comment SonarQube results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 **SonarQube Analysis Completed**\n\nCheck the [SonarQube Dashboard](https://sonarcloud.io/dashboard?id=javiyt_gridirontimer) for detailed code quality metrics.`
            });
